// Calendar export helpers
function calDatetime(date, time, offsetHours) {
  // Returns "YYYYMMDDTHHmmss" adding offsetHours to the time
  var base = new Date(date + 'T' + (time || '00:00') + ':00');
  if (offsetHours) base.setHours(base.getHours() + offsetHours);
  return base.getFullYear()
    + String(base.getMonth()+1).padStart(2,'0')
    + String(base.getDate()).padStart(2,'0')
    + 'T'
    + String(base.getHours()).padStart(2,'0')
    + String(base.getMinutes()).padStart(2,'0')
    + '00';
}
function googleCalUrl(ev) {
  var hasTime = ev.time && ev.time.trim() !== '';
  var start, end;
  if (hasTime) {
    start = calDatetime(ev.date, ev.time, 0);
    end   = calDatetime(ev.date, ev.time, 2); // 2h por defecto
  } else {
    start = ev.date.replace(/-/g, '');
    var nd = new Date(ev.date + 'T12:00:00');
    nd.setDate(nd.getDate() + 1);
    end = nd.getFullYear() + String(nd.getMonth()+1).padStart(2,'0') + String(nd.getDate()).padStart(2,'0');
  }
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text=' + encodeURIComponent(ev.title)
    + '&dates=' + start + '/' + end
    + '&details=' + encodeURIComponent(ev.description || '')
    + '&location=' + encodeURIComponent(ev.location || '');
}
function downloadICS(ev) {
  var hasTime = ev.time && ev.time.trim() !== '';
  var dtStart, dtEnd;
  if (hasTime) {
    dtStart = 'DTSTART:' + calDatetime(ev.date, ev.time, 0);
    dtEnd   = 'DTEND:'   + calDatetime(ev.date, ev.time, 2);
  } else {
    var d  = ev.date.replace(/-/g, '');
    var nd = new Date(ev.date + 'T12:00:00');
    nd.setDate(nd.getDate() + 1);
    var ed = nd.getFullYear() + String(nd.getMonth()+1).padStart(2,'0') + String(nd.getDate()).padStart(2,'0');
    dtStart = 'DTSTART;VALUE=DATE:' + d;
    dtEnd   = 'DTEND;VALUE=DATE:'   + ed;
  }
  var stamp = new Date().toISOString().replace(/[-:.]/g,'').slice(0,15) + 'Z';
  var ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Detox Panoramas//ES\r\nBEGIN:VEVENT\r\n'
    + dtStart + '\r\n'
    + dtEnd   + '\r\n'
    + 'DTSTAMP:' + stamp + '\r\n'
    + 'SUMMARY:' + ev.title + '\r\n'
    + 'DESCRIPTION:' + (ev.description || '') + '\r\n'
    + 'LOCATION:' + (ev.location || '') + '\r\n'
    + 'END:VEVENT\r\nEND:VCALENDAR';
  var blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = ev.title.replace(/\s+/g,'_') + '.ics'; a.click();
  URL.revokeObjectURL(url);
}

  }, [events]);
  var absences = useMemo(function() {
    var c = {}; members.forEach(function(m) { c[m.id] = 0; });
    events.forEach(function(ev) {
      if (ev.status === 'confirmed') {
        var excl = ev.excluded || [];
        members.forEach(function(m) {
          if (excl.indexOf(m.id) >= 0) return;
          if (ev.votes[m.id] === 'yes' && ev.absent && ev.absent.indexOf(m.id) >= 0) c[m.id] = (c[m.id]||0)+1;
        });
      }
    });
    return c;
  }, [events, members]);
  var bombas = useMemo(function() {
    var c = {}; members.forEach(function(m) { c[m.id] = 0; });
    events.forEach(function(ev) {
      if (ev.status === 'confirmed' && ev.bomba) {
        ev.bomba.forEach(function(mid) { if (c[mid]!==undefined) c[mid] = (c[mid]||0)+1; });
      }
    });
    return c;
  }, [events, members]);

  function addMember(name, avatar, birthday) {
    var next = members.concat([{ id:genId(), name:name, avatar:avatar, birthday:birthday||'' }]);
    setMembers(next); syncDB(next, events, gastos);
  }
  function removeMember(id) {
    var next = members.filter(function(m) { return m.id !== id; });
    setMembers(next); syncDB(next, events, gastos);
  }
  function updateMember(id, name, avatar, birthday) {
    var next = members.map(function(m) { return m.id===id ? Object.assign({},m,{name:name,avatar:avatar,birthday:birthday||''}) : m; });
    setMembers(next); syncDB(next, events, gastos);
  }
  function addEvent(ev) {
    var next = events.concat([Object.assign({}, ev, { id:genId(), votes:{}, absent:[], bomba:[], excluded:[], plusOne:{}, status:'voting' })]);
    setEvents(next); syncDB(members, next, gastos);
  }
  function updateEvent(id, ch) {
    var next = events.map(function(e) { return e.id===id ? Object.assign({},e,ch) : e; });
    setEvents(next); syncDB(members, next, gastos);
  }
  function voteEvent(eid, mid, v) {
    var next = events.map(function(e) { if (e.id!==eid) return e; var vt=Object.assign({},e.votes); vt[mid] = vt[mid]===v ? null : v; return Object.assign({},e,{votes:vt}); });
    setEvents(next); syncDB(members, next, gastos);
  }
  function confirmEvent(eid) {
    var next = events.map(function(e) {
      if (e.id!==eid) return e;
      var excl = e.excluded || [];
      var active = members.filter(function(m){ return excl.indexOf(m.id) < 0; });
      var preAbsent = active.filter(function(m){ return e.votes[m.id]==='no'; }).map(function(m){ return m.id; });
      var preBomba  = active.filter(function(m){ return !e.votes[m.id]; }).map(function(m){ return m.id; });
      return Object.assign({},e,{status:'confirmed', absent:preAbsent, bomba:preBomba});
    });
    setEvents(next); syncDB(members, next, gastos);
  }
  function deleteEvent(eid) {
    var next = events.filter(function(e) { return e.id!==eid; });
    setEvents(next); setSelEv(null); syncDB(members, next, gastos);
  }
  function markAbsent(eid, mid) {
    var next = events.map(function(e) {
      if (e.id!==eid) return e;
      var inAbsent = e.absent.indexOf(mid)>=0;
      var abs = inAbsent ? e.absent.filter(function(a){return a!==mid;}) : e.absent.concat([mid]);
      var bmb = inAbsent ? (e.bomba||[]) : (e.bomba||[]).filter(function(a){return a!==mid;});
      return Object.assign({},e,{absent:abs,bomba:bmb});
    });
    setEvents(next); syncDB(members, next, gastos);
  }
  function markBomba(eid, mid) {
    var next = events.map(function(e) {
      if (e.id!==eid) return e;
      var inBomba = (e.bomba||[]).indexOf(mid)>=0;
      var bmb = inBomba ? (e.bomba||[]).filter(function(a){return a!==mid;}) : (e.bomba||[]).concat([mid]);
      var abs = inBomba ? e.absent : e.absent.filter(function(a){return a!==mid;});
      return Object.assign({},e,{bomba:bmb,absent:abs});
    });
    setEvents(next); syncDB(members, next, gastos);
  }
  function markAsistio(eid, mid) {
    var next = events.map(function(e) {
      if (e.id!==eid) return e;
      return Object.assign({},e,{absent:e.absent.filter(function(a){return a!==mid;}),bomba:(e.bomba||[]).filter(function(a){return a!==mid;})});
    });
    setEvents(next); syncDB(members, next, gastos);
  }
  function excludeFromEvent(eid, mid) {
    var next = events.map(function(e) {
      if (e.id!==eid) return e;
      var excl = (e.excluded||[]).concat([mid]);
      var vt = Object.assign({},e.votes); delete vt[mid];
      var abs = e.absent.filter(function(a){return a!==mid;});
      var bmb = (e.bomba||[]).filter(function(a){return a!==mid;});
      return Object.assign({},e,{excluded:excl,votes:vt,absent:abs,bomba:bmb});
    });
    setEvents(next); syncDB(members, next, gastos);
  }
  function includeInEvent(eid, mid) {
    var next = events.map(function(e) {
      if (e.id!==eid) return e;
      var excl = (e.excluded||[]).filter(function(a){return a!==mid;});
      return Object.assign({},e,{excluded:excl});
    });
    setEvents(next); syncDB(members, next, gastos);
  }
  function togglePlusOne(eid, mid) {
    var next = events.map(function(e) {
      if (e.id!==eid) return e;
      var po = Object.assign({}, e.plusOne||{}); po[mid] = !po[mid];
      return Object.assign({},e,{plusOne:po});
    });
    setEvents(next); syncDB(members, next, gastos);
  }
  function addGasto(g) {
    var next = gastos.concat([Object.assign({}, g, { id:genId(), date:new Date().toISOString().slice(0,10) })]);
    setGastos(next); syncDB(members, events, next);
  }
  function removeGasto(id) {
    var next = gastos.filter(function(g) { return g.id !== id; });
    setGastos(next); syncDB(members, events, next);
  }
  function updateGasto(id, changes) {
    var next = gastos.map(function(g) { return g.id===id ? Object.assign({},g,changes) : g; });
    setGastos(next); syncDB(members, events, next);
  }
  function cancelEvent(eid) {
    var next = events.map(function(e) { return e.id===eid ? Object.assign({},e,{status:'cancelled'}) : e; });
    setEvents(next); syncDB(members, next, gastos);
  }
  function reopenEvent(eid) {
    var next = events.map(function(e) { return e.id===eid ? Object.assign({},e,{status:'voting'}) : e; });
    setEvents(next); syncDB(members, next, gastos);
  }
  function goToGastos(eventId) {
    setGastosFilter(eventId || null);
    setView('gastos');
  }
  function openEvent(eventId) { setSelEv(eventId); setView('events'); }

  // Auto-cancelación: cuando carga la app, cancela eventos en votación cuya fecha ya pasó y no alcanzaron el mínimo de síes
  useEffect(function() {
    if (loading) return;
    var today = new Date().toISOString().slice(0,10);
    var changed = false;
    var next = events.map(function(e) {
      if (e.status !== 'voting') return e;
      if (e.date > today) return e;
      var yesVotes = Object.values(e.votes).filter(function(v){return v==='yes';}).length;
      if (yesVotes < (e.minVoters || 1)) {
        changed = true;
        return Object.assign({}, e, {status:'cancelled'});
      }
      return e;
    });
    if (changed) { setEvents(next); syncDB(members, next, gastos); }
  }, [loading]);

  // Deep link: abre evento directo si URL tiene ?event=ID
  useEffect(function() {
    if (loading) return;
    var params = new URLSearchParams(window.location.search);
    var eventId = params.get('event');
    if (eventId) { setSelEv(eventId); setView('events'); }
  }, [loading]);

  var currentEvent = events.find(function(e) { return e.id === selEv; });

  var TABS = [
    { key:'calendar', label:'Calendario', icon:'📅' },
    { key:'events',   label:'Panoramas',  icon:'🎯' },
    { key:'gastos',   label:'Gastos',     icon:'💰' },
    { key:'ranking',  label:'Corretiaos', icon:'💀' },
    { key:'members',  label:'Grupo',      icon:'👥' }
  ];

  if (loading) return (
    <ThemeCtx.Provider value={t}>
      <div style={{ backgroundColor:t.bg, minHeight:'100vh', maxWidth:520, margin:'0 auto', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden' }}>
        {/* Animated rings */}
        <div className="splash-ring" style={{ position:'absolute', width:320, height:320, borderRadius:'50%', border:'1px solid '+t.primary, opacity:0.15, animationDelay:'0s' }} />
        <div className="splash-ring" style={{ position:'absolute', width:220, height:220, borderRadius:'50%', border:'1px solid '+t.primary, opacity:0.2, animationDelay:'0.4s' }} />
        <div className="splash-ring" style={{ position:'absolute', width:140, height:140, borderRadius:'50%', background:t.primaryBg, animationDelay:'0.8s' }} />
        <div className="splash-logo" style={{ position:'relative', zIndex:1, marginBottom:24 }}>
          <DetoxLogo height={56} color={t.primary} />
        </div>
        <div className="splash-text" style={{ position:'relative', zIndex:1, fontSize:11, color:t.textMuted, fontFamily:"'Space Mono',monospace", letterSpacing:'0.15em' }}>Cargando...</div>
      </div>
    </ThemeCtx.Provider>
  );

  return (
    <ThemeCtx.Provider value={t}>
      <div style={{ fontFamily:"'Outfit',sans-serif", backgroundColor:t.bg, backgroundImage:t.bgPattern, backgroundSize:'100% 100%', backgroundAttachment:'fixed', color:t.text, minHeight:'100vh', maxWidth:520, margin:'0 auto', position:'relative', transition:'background-color 0.3s, color 0.2s' }}>

        {/* ── HEADER ── */}
        <div style={{ padding:'40px 20px 16px', borderBottom:'1px solid '+t.border }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>

            {/* Logo */}
            <DetoxLogo height={48} color={t.primary} />

            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              {/* Theme toggle */}
              <button className="p-btn" onClick={function() { setDark(!dark); }}
                style={{ background:t.surface, border:'1px solid '+t.border, borderRadius:10, width:38, height:38, fontSize:17, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:t.btnShadow }}>
                {dark ? '☀️' : '🌙'}
              </button>
            </div>
          </div>
        </div>

        {/* ── CONTENT ── */}
        <div style={{ padding:'0 14px 140px' }}>
          {view==='calendar' && <CalendarView ym={ym} setYm={setYm} feriadoMap={feriadoMap} eventsByDate={eventsByDate} events={events} members={members} onSelectDate={function(d){setSelDate(d);setShowNew(true);}} onOpenEvent={openEvent} />}
          {view==='events'   && <EventsView   events={events} members={members} gastos={gastos} onVote={voteEvent} onConfirm={confirmEvent} onMarkAbsent={markAbsent} onMarkBomba={markBomba} onMarkAsistio={markAsistio} onExclude={excludeFromEvent} onInclude={includeInEvent} onDelete={deleteEvent} onTogglePlusOne={togglePlusOne} onEdit={function(){setShowEdit(true);}} onGastos={goToGastos} onCancel={cancelEvent} onReopen={reopenEvent} selEv={selEv} setSelEv={setSelEv} />}
          {view==='gastos'   && <GastosView   gastos={gastos} members={members} events={events} onRemove={removeGasto} onAdd={function(){setShowAddG(true);}} onEdit={function(id){setEditGastoId(id);}} onUpdate={updateGasto} filterEventId={gastosFilter} onClearFilter={function(){setGastosFilter(null);}} />}
          {view==='ranking'  && <RankingView  members={members} absences={absences} bombas={bombas} events={events} />}
          {view==='members'  && <MembersView  members={members} absences={absences} onAdd={function(){setShowAddM(true);}} onRemove={removeMember} onEdit={function(id){setEditMemberId(id);}} />}
        </div>

        {/* ── FAB ── */}
        <button className="p-btn" onClick={function(){ if(view==='gastos'){setShowAddG(true);}else{setShowNew(true);} }}
          style={{ position:'fixed', bottom:100, right:'max(16px, calc(50% - 244px))', width:52, height:52, borderRadius:'50%', border:'none', background:t.primary, color:t.isDark?'#000':'#fff', fontSize:28, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', zIndex:50, boxShadow:t.primaryShadow, fontWeight:700 }}>+</button>

        {/* ── BOTTOM NAV ── */}
        <div style={{ position:'fixed', bottom:18, left:'50%', transform:'translateX(-50%)', display:'flex', background:t.navBg, border:'1px solid '+t.border, borderRadius:16, padding:'5px', gap:2, boxShadow:t.cardShadow, zIndex:100, maxWidth:400, width:'calc(100% - 32px)' }}>
          {TABS.map(function(tab) {
            var active = view === tab.key;
            return (
              <button key={tab.key} className="p-nav-btn" onClick={function(){setView(tab.key); setSelEv(null);}}
                style={{ flex:1, padding:'9px 4px', border:'none', borderRadius:12, cursor:'pointer', fontSize:10, fontWeight:active?700:500, fontFamily:'inherit', background:active?t.primaryBg:'transparent', color:active?t.primary:t.textMuted, outline:active?('1px solid '+t.primaryBorder):'none', display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                <span style={{ fontSize:19 }}>{tab.icon}</span>
                <span>{tab.label}</span>
              </button>
            );
          })}
        </div>

        {showNew  && <EventModal mode="create" date={selDate} initial={null} onClose={function(){setShowNew(false);setSelDate(null);}} onSave={function(ev){addEvent(ev);setShowNew(false);setSelDate(null);}} />}
        {showEdit && currentEvent && <EventModal mode="edit" date={null} initial={currentEvent} members={members} onClose={function(){setShowEdit(false);}} onSave={function(ch){updateEvent(selEv,ch);setShowEdit(false);}} />}
        {showAddM && <AddMemberModal onClose={function(){setShowAddM(false);}} onSave={function(n,a,b){addMember(n,a,b);setShowAddM(false);}} />}
        {editMemberId && <EditMemberModal member={members.find(function(m){return m.id===editMemberId;})} onClose={function(){setEditMemberId(null);}} onSave={function(n,a,b){updateMember(editMemberId,n,a,b);setEditMemberId(null);}} />}
        {showAddG && <GastosModal members={members} events={events} defaultEventId={gastosFilter} onClose={function(){setShowAddG(false);}} onSave={function(g){addGasto(g);setShowAddG(false);}} />}
        {editGastoId && <GastosModal initial={gastos.find(function(g){return g.id===editGastoId;})} members={members} events={events} onClose={function(){setEditGastoId(null);}} onSave={function(payload){updateGasto(editGastoId,payload);setEditGastoId(null);}} />}
      </div>
    </ThemeCtx.Provider>
  );
}

// ── CALENDAR VIEW ──────────────────────────────────────────
function CalendarView(props) {
  var ym=props.ym; var setYm=props.setYm; var feriadoMap=props.feriadoMap;
  var eventsByDate=props.eventsByDate; var events=props.events; var members=props.members||[];
  var onSelectDate=props.onSelectDate; var onOpenEvent=props.onOpenEvent;
  var t  = useT();
  var y  = ym.y; var m = ym.m;
  var tk = todayKey();
  var now = new Date();

  function prev() { if (m===0){setYm({y:y-1,m:11});}else{setYm({y:y,m:m-1});} }
  function next() { if (m===11){setYm({y:y+1,m:0});}else{setYm({y:y,m:m+1});} }
  function goToday() { setYm({ y:now.getFullYear(), m:now.getMonth() }); }
  var isCurrentMonth = y===now.getFullYear() && m===now.getMonth();

  // Birthday map: key = MM-DD, value = [member, ...]
  var bdMap = useMemo(function() {
    var map = {};
    members.forEach(function(mb) {
      if (!mb.birthday) return;
      var parts = mb.birthday.split('-'); // YYYY-MM-DD or MM-DD
      var key = parts.length===3 ? (parts[1]+'-'+parts[2]) : mb.birthday;
      if (!map[key]) map[key] = [];
      map[key].push(mb);
    });
    return map;
  }, [members]);

  var days = daysInMonth(y,m);
  var fd   = firstDay(y,m);
  var cells = [];
  for (var i=0;i<fd;i++) cells.push(null);
  for (var d=1;d<=days;d++) cells.push(d);

  var upcoming = events.filter(function(e){return e.date>=tk;}).sort(function(a,b){return a.date<b.date?-1:1;}).slice(0,5);
  var upFer    = FERIADOS.filter(function(f){return f.date>=tk;}).slice(0,4);

  return (
    <div style={{ paddingTop:14 }}>
      {/* Month nav */}
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:14 }}>
        <ActionBtn onClick={prev} width={36} height={36} style={{ fontSize:20, borderRadius:10, flexShrink:0 }}>‹</ActionBtn>
        <div style={{ flex:1, background:t.surface, border:'1px solid '+t.border, borderRadius:12, padding:'10px 14px', textAlign:'center', boxShadow:t.cardShadow }}>
          <div style={{ fontSize:17, fontWeight:700, color:t.text }}>{MONTHS[m]} <span style={{ color:t.textMuted }}>{y}</span></div>
        </div>
        <ActionBtn onClick={next} width={36} height={36} style={{ fontSize:20, borderRadius:10, flexShrink:0 }}>›</ActionBtn>
        {/* Today button */}
        {!isCurrentMonth && (
          <button className="p-btn" onClick={goToday}
            style={{ background:t.primaryBg, border:'1px solid '+t.primaryBorder, borderRadius:10, padding:'0 12px', height:36, fontSize:11, fontWeight:700, color:t.primary, cursor:'pointer', fontFamily:'inherit', flexShrink:0, boxShadow:t.btnShadow, whiteSpace:'nowrap' }}>
            Hoy
          </button>
        )}
      </div>

      {/* Day headers */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3, marginBottom:4 }}>
        {['Lu','Ma','Mi','Ju','Vi','Sá','Do'].map(function(day) {
          return <div key={day} style={{ fontSize:10, fontWeight:700, color:t.textMuted, textAlign:'center', padding:'3px 0', fontFamily:"'Space Mono',monospace" }}>{day}</div>;
        })}
      </div>

      {/* Grid */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3 }}>
        {cells.map(function(day, idx) {
          if (!day) return <div key={'e'+idx} />;
          var dk   = dKey(y,m,day);
          var fer  = feriadoMap[dk];
          var evts = eventsByDate[dk]||[];
          var isT  = dk===tk;
          var isWk = (idx%7===5)||(idx%7===6);
          var mmdd = String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
          var bds  = bdMap[mmdd]||[];
          var wkBg  = t.isDark ? 'rgba(255,160,80,0.07)' : 'rgba(255,140,50,0.08)';
          var wkCol = t.isDark ? '#D4845A' : '#B85C10';
          var bg   = isT ? t.primary : fer ? t.dangerBg : evts.length>0 ? t.primaryBg : isWk ? wkBg : t.surface;
          var col  = isT ? (t.isDark?'#000':'#fff') : fer ? t.dangerText : isWk ? wkCol : t.text;
          var bd   = isT ? 'none' : bds.length>0 ? '1px solid rgba(255,100,200,0.4)' : fer ? ('1px solid '+t.dangerBorder) : isWk ? ('1px solid rgba(255,140,50,0.2)') : ('1px solid '+t.border);
          var sh   = isT ? t.primaryShadow : evts.length>0 ? '0 0 0 1px '+t.primaryBorder : t.cardShadow;
          return (
            <button key={dk} className="cal-day" onClick={function(){onSelectDate(dk);}}
              style={{ padding:'7px 2px 9px', borderRadius:10, border:bd, background:bg, cursor:'pointer', color:col, fontFamily:"'Space Mono',monospace", fontSize:12, fontWeight:isT?900:400, minHeight:50, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2, boxShadow:sh }}>
              <span>{day}</span>
              {bds.length>0 && <span style={{ fontSize:9 }}>🎂</span>}
              {fer && !bds.length && <span style={{ fontSize:6, maxWidth:'100%', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', display:'block', opacity:0.8, padding:'0 1px' }}>{fer.name.split(' ')[0]}</span>}
              {evts.length>0 && (
                <div style={{ display:'flex', gap:1 }}>
                  {evts.slice(0,3).map(function(e){
                    var cat=getCat(e);
                    return <span key={e.id} style={{ fontSize:8 }}>{cat?cat.emoji:''}</span>;
                  })}
                </div>
              )}
            </button>
          );
        })}
      </div>

      {/* Upcoming events */}
      <SectionHeader label="PRÓXIMOS EVENTOS" mt={22} />
      {upcoming.length===0
        ? <EmptyBox text="Sin eventos — crea uno con el botón +" />
        : upcoming.map(function(ev) {
            var cat   = getCat(ev);
            var yes   = Object.values(ev.votes).filter(function(v){return v==='yes';}).length;
            var no    = Object.values(ev.votes).filter(function(v){return v==='no';}).length;
            var maybe = Object.values(ev.votes).filter(function(v){return v==='maybe';}).length;
            var pl    = Object.values(ev.plusOne||{}).filter(Boolean).length;
            var isV   = ev.status==='voting';
            return (
              <div key={ev.id} className="p-card" onClick={function(){onOpenEvent(ev.id);}}
                style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 13px', marginBottom:6, borderRadius:12, background:t.surface, border:'1px solid '+t.border, cursor:'pointer', boxShadow:t.cardShadow }}>
                <div style={{ width:38, height:38, borderRadius:9, background:(cat?cat.color:'#888')+'20', border:'1px solid '+(cat?cat.color:'#888')+'40', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>{cat?cat.emoji:'📌'}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:700, fontSize:13, color:t.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{ev.title}</div>
                  <div style={{ fontSize:10, color:t.textMuted, fontFamily:"'Space Mono',monospace" }}>{fmtDate(ev.date)}</div>
                  <div style={{ display:'flex', gap:6, marginTop:3 }}>
                    {yes>0   && <span style={{ fontSize:9, color:t.successText, fontWeight:700 }}>👍{yes}</span>}
                    {maybe>0 && <span style={{ fontSize:9, color:t.warningText, fontWeight:700 }}>🤔{maybe}</span>}
                    {no>0    && <span style={{ fontSize:9, color:t.dangerText,  fontWeight:700 }}>👎{no}</span>}
                  </div>
                </div>
                <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5 }}>
                  <span className="p-tag" style={{ background:isV?t.warningBg:t.successBg, color:isV?t.warningText:t.successText, border:'1px solid '+(isV?t.warningBorder:t.successBorder) }}>
                    {isV?'VOTANDO':'LISTO'}
                  </span>
                  {pl>0 && <span style={{ fontSize:9, color:t.textMuted }}>👫 +{pl}</span>}
                </div>
              </div>
            );
          })
      }

      {/* Cumpleaños del mes */}
      {(function() {
        var mmPre = String(m+1).padStart(2,'0')+'-';
        var monthBds = [];
        Object.keys(bdMap).forEach(function(key) {
          if (key.indexOf(mmPre) === 0) {

// ── WMO WEATHER CODE → emoji ───────────────────────────────
function wmoEmoji(code) {
  if (code===0) return '☀️';
  if (code<=2)  return '🌤️';
  if (code<=3)  return '☁️';
  if (code<=48) return '🌫️';
  if (code<=57) return '🌦️';
  if (code<=67) return '🌧️';
  if (code<=77) return '🌨️';
  if (code<=82) return '🌧️';
  if (code<=95) return '⛈️';
  return '⛈️';
}

// ── WEATHER + MAP WIDGET ───────────────────────────────────
function WeatherMapWidget(props) {
  var ev = props.ev;
  var t  = useT();
  var geoState  = useState(null);  var geo=geoState[0];   var setGeo=geoState[1];
  var wxState   = useState(null);  var wx=wxState[0];     var setWx=wxState[1];
  var errState  = useState('');    var geoErr=errState[0];  var setGeoErr=errState[1];
  var loadState = useState(false); var wxLoad=loadState[0]; var setWxLoad=loadState[1];

  useEffect(function() {
    if (!ev.location) return;
    setWxLoad(true); setGeoErr(''); setGeo(null); setWx(null);
    fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(ev.location)+'&format=json&limit=1', { headers:{ 'Accept-Language':'es' } })
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (!data||!data[0]) { setGeoErr('Dirección no encontrada'); setWxLoad(false); return; }
        var lat = parseFloat(data[0].lat); var lon = parseFloat(data[0].lon);
        setGeo({ lat:lat, lon:lon });
        var today = new Date(); today.setHours(0,0,0,0);
        var evDate = new Date(ev.date+'T12:00:00');
        var diff = Math.round((evDate-today)/(1000*60*60*24));
        if (diff < -1 || diff > 15) { setWxLoad(false); return; }
        return fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=auto&start_date='+ev.date+'&end_date='+ev.date);
      })
      .then(function(r){ if(r) return r.json(); })
      .then(function(data){
        if (data && data.daily) {
          setWx({ code:data.daily.weathercode[0], tmax:Math.round(data.daily.temperature_2m_max[0]), tmin:Math.round(data.daily.temperature_2m_min[0]), rain:data.daily.precipitation_probability_max[0] });
        }
        setWxLoad(false);
      })
      .catch(function(){ setWxLoad(false); });
  }, [ev.location, ev.date]);

  if (!ev.location) return null;

  var mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(ev.location);

  if (geoErr) return (
    <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 13px', marginBottom:8, borderRadius:10, background:t.warningBg, border:'1px solid '+t.warningBorder }}>
      <span style={{ fontSize:11, color:t.warningText, flex:1 }}>📍 {geoErr}</span>
      <a href={mapsUrl} target="_blank" rel="noopener noreferrer" style={{ fontSize:11, fontWeight:700, color:t.primary, textDecoration:'none' }}>🗺️ Maps</a>
    </div>
  );

  return (
    <div style={{ marginBottom:8 }}>
      {wxLoad && !geo && (
        <div style={{ fontSize:11, color:t.textMuted, padding:'6px 2px' }}>Cargando clima...</div>
      )}
      {geo && (
        <div style={{ padding:'11px 14px', borderRadius:12, background:t.surface, border:'1px solid '+t.border, marginBottom:6, boxShadow:t.cardShadow }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {wx && (
              <div style={{ display:'flex', alignItems:'center', gap:6, flex:1 }}>
                <span style={{ fontSize:26 }}>{wmoEmoji(wx.code)}</span>
                <div>
                  <div style={{ fontSize:14, fontWeight:700, color:t.text }}>{wx.tmax}° / {wx.tmin}°</div>
                  <div style={{ fontSize:10, color:t.textMuted }}>💧 {wx.rain}% lluvia</div>
                </div>
              </div>
            )}
            {wxLoad && <div style={{ flex:1, fontSize:11, color:t.textMuted }}>Cargando clima...</div>}
            {!wx && !wxLoad && <div style={{ flex:1 }}></div>}
            <a href={mapsUrl} target="_blank" rel="noopener noreferrer"
              style={{ padding:'6px 14px', borderRadius:9, border:'1px solid '+t.primaryBorder, background:t.primaryBg, color:t.primary, fontSize:11, fontWeight:700, textDecoration:'none', display:'flex', alignItems:'center', gap:5, boxShadow:t.btnShadow, whiteSpace:'nowrap' }}>
              🗺️ Maps
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

                    )
                    : (!isV && !isCancelled)

                        var lblAsistio = isPast ? 'Asistió ✓' : 'Asistirá ✓';

                </div>

          <div style={{ marginTop:10, padding:'8px 11px', borderRadius:9, background:t.primaryBg, border:'1px solid '+t.primaryBorder }}>
            <span style={{ fontSize:11, color:t.textSub }}>👫 Con pareja: {activeMembers.filter(function(m){return plusOne[m.id];}).map(function(m){return m.name+'+1';}).join(', ')}</span>

              style={{ width:'100%', marginTop:14, padding:'13px', borderRadius:11, border:'none', background:yes>=2?t.primary:t.inputBg, color:yes>=2?(t.isDark?'#000':'#fff'):t.textMuted, fontWeight:800, fontSize:14, cursor:'pointer', fontFamily:'inherit', boxShadow:yes>=2?t.primaryShadow:'none' }}>

            </button>
            <button className="p-btn" onClick={function(){onCancel(ev.id);}}
              style={{ width:'100%', marginTop:8, padding:'10px', borderRadius:11, border:'1px solid '+t.dangerBorder, background:'transparent', color:t.dangerText, fontWeight:600, fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>
              Sin confirmación ❌
            </button>
          </div>

        {isCancelled && (
          <button className="p-btn" onClick={function(){onReopen(ev.id);}}

        Eliminar panorama
      </button>
    </div>
  );
}

// ── RANKING VIEW ───────────────────────────────────────────
function RankingView(props) {
  var members=props.members; var absences=props.absences; var bombas=props.bombas||{}; var events=props.events;
  var t = useT();
  var conf = events.filter(function(e){return e.status==='confirmed';});

  // Top 5 corretiaos
  var srtAbs = members.slice().sort(function(a,b){return (absences[b.id]||0)-(absences[a.id]||0);}).slice(0,5);
  var maxA = Math.max.apply(null, members.map(function(m){return absences[m.id]||0;}).concat([1]));

  // Top 5 bombas de humo
  var srtBmb = members.slice().sort(function(a,b){return (bombas[b.id]||0)-(bombas[a.id]||0);}).slice(0,5);
  var maxB = Math.max.apply(null, members.map(function(m){return bombas[m.id]||0;}).concat([1]));

  function RankRow(rowProps) {
    var m=rowProps.m; var i=rowProps.i; var cnt=rowProps.cnt; var maxV=rowProps.maxV;
    var label=rowProps.label; var icon=rowProps.icon; var accentCol=rowProps.accentCol; var accentBg=rowProps.accentBg; var accentBd=rowProps.accentBd; var kingLabel=rowProps.kingLabel;
    var pct  = Math.round((cnt/maxV)*100);
    var wrst = i===0&&cnt>0;
    var nc   = cnt>2?accentCol:cnt>0?t.warningText:t.success;
    return (
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 14px', marginBottom:7, borderRadius:13, background:wrst?accentBg:t.surface, border:'1px solid '+(wrst?accentBd:t.border), boxShadow:t.cardShadow }}>
        <span style={{ fontFamily:"'Space Mono',monospace", fontSize:13, fontWeight:700, color:i===0?accentCol:i===1?t.warningText:t.textMuted, minWidth:24 }}>#{i+1}</span>
        <div style={{ width:38, height:38, borderRadius:9, background:t.inputBg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:21 }}>{m.avatar}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontWeight:700, fontSize:13, color:t.text, display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
            {m.name}
            {wrst && <span style={{ fontSize:9, color:accentCol, fontWeight:700, background:accentBg, border:'1px solid '+accentBd, borderRadius:4, padding:'1px 6px' }}>{kingLabel}</span>}
          </div>
          <div style={{ marginTop:6, height:5, borderRadius:3, background:t.divider, overflow:'hidden' }}>
            <div style={{ height:'100%', borderRadius:3, width:pct+'%', background:nc }}></div>
          </div>
          {cnt>0 && <div style={{ fontSize:11, marginTop:3 }}>{icon.repeat(Math.min(cnt,8))}</div>}
        </div>
        <div style={{ textAlign:'right', minWidth:36 }}>
          <div style={{ fontSize:26, fontWeight:900, fontFamily:"'Space Mono',monospace", lineHeight:1, color:nc }}>{cnt}</div>
          <div style={{ fontSize:8, color:t.textMuted, marginTop:1, letterSpacing:'0.06em' }}>{label}</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ paddingTop:14 }}>
      {/* Header */}
      <div style={{ padding:'14px 16px', borderRadius:14, marginBottom:14, background:t.dangerBg, border:'1px solid '+t.dangerBorder, borderLeft:'4px solid '+t.danger, boxShadow:t.cardShadow }}>
        <div style={{ fontSize:16, fontWeight:800, color:t.dangerText }}>💀 Muro de los Corretiaos</div>
        <div style={{ fontSize:11, color:t.textMuted, marginTop:2 }}>Top 5 · faltas y bombas de humo</div>
      </div>

      {conf.length===0
        ? <EmptyBox text="Confirma panoramas para ver el ranking" />
        : members.length===0
        ? <EmptyBox text="Agrega participantes primero" />
        : (
          <div>
            {/* Top 5 Faltas */}
            <SectionHeader label="💀  TOP CORRETIAOS" mt={0} />
            {srtAbs.map(function(m,i){
              return <RankRow key={m.id} m={m} i={i} cnt={absences[m.id]||0} maxV={maxA} label="FALTAS" icon="💀" accentCol={t.dangerText} accentBg={t.dangerBg} accentBd={t.dangerBorder} kingLabel="👑 REY CORRETIAO" />;
            })}

            {/* Top 5 Bombas */}
            <SectionHeader label="💨  TOP BOMBAS DE HUMO" mt={22} />
            {srtBmb.map(function(m,i){
              return <RankRow key={m.id} m={m} i={i} cnt={bombas[m.id]||0} maxV={maxB} label="BOMBAS" icon="💨" accentCol="#7c3aed" accentBg="#ede9fe" accentBd="#8b5cf6" kingLabel="👑 REY BOMBA" />;
            })}
          </div>
        )
      }

      {conf.length>0 && (
        <div style={{ marginTop:16 }}>
          <SectionHeader label="ESTADÍSTICAS" mt={0} />
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:7 }}>
            {[
              {v:events.length,    l:'Panoramas',    c:t.primary,      bg:t.primaryBg,  b:t.primaryBorder},
              {v:conf.length,      l:'Confirmados',  c:t.successText,  bg:t.successBg,  b:t.successBorder},
              {v:Object.values(absences).reduce(function(a,b){return a+b;},0), l:'Faltas totales', c:t.dangerText, bg:t.dangerBg, b:t.dangerBorder},
              {v:Object.values(bombas).reduce(function(a,b){return a+b;},0), l:'Bombas totales', c:'#7c3aed', bg:'#ede9fe', b:'#8b5cf6'}
            ].map(function(s) {
              return (
                <div key={s.l} style={{ textAlign:'center', padding:'14px 10px', borderRadius:12, background:s.bg, border:'1px solid '+s.b, boxShadow:t.cardShadow }}>
                  <div style={{ fontSize:28, fontWeight:900, color:s.c, fontFamily:"'Space Mono',monospace", lineHeight:1 }}>{s.v}</div>
                  <div style={{ fontSize:9, color:t.textMuted, marginTop:5, letterSpacing:'0.07em' }}>{s.l.toUpperCase()}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

                      <button className="p-btn" onClick={function(){setConfirmDel(null);}} style={{ padding:'5px 12px', borderRadius:8, border:'1px solid '+t.border, background:t.inputBg, color:t.text, fontSize:11, cursor:'pointer', fontFamily:'inherit', boxShadow:t.btnShadow }}>No</button>
                    </div>

                    <div style={{ display:'flex', gap:4 }}>
                      <button className="p-btn" onClick={function(){onEdit(m.id);}} style={{ background:'none', border:'none', color:t.textMuted, cursor:'pointer', fontSize:16, padding:4 }}>✏️</button>
                      <button className="p-btn" onClick={function(){setConfirmDel(m.id);}} style={{ background:'none', border:'none', color:t.textMuted, cursor:'pointer', fontSize:18, padding:4 }}>✕</button>

          })

}

// ── EXPENSE SPLIT ALGORITHM ────────────────────────────────
function computeBalances(gastos, members) {
  var balances = {};
  members.forEach(function(m) { balances[m.id] = 0; });
  var n = members.length;
  if (n === 0) return balances;
  gastos.forEach(function(g) {
    if (g.finalized) return;
    var paid = g.paid || {};
    var splitMode = g.splitMode || 'equal';
    var exclG = g.excludedMembers || [];
    var activeM = members.filter(function(m){ return exclG.indexOf(m.id) < 0; });
    var nonPayers = activeM.filter(function(m){ return m.id !== g.paidBy; });
    if (splitMode === 'equal') {
      var share = g.amount / activeM.length;
      nonPayers.forEach(function(m) {
        if (!paid[m.id]) {
          balances[m.id] = (balances[m.id] || 0) - share;
          balances[g.paidBy] = (balances[g.paidBy] || 0) + share;
        }
      });
    } else {
      var customAmounts = g.customAmounts || {};
      nonPayers.forEach(function(m) {
        var amt = customAmounts[m.id] || 0;
        if (!paid[m.id] && amt > 0) {
          balances[m.id] = (balances[m.id] || 0) - amt;
          balances[g.paidBy] = (balances[g.paidBy] || 0) + amt;
        }
      });
    }
  });
  return balances;
}

function computeTransactions(members, balances) {
  var debtors = []; var creditors = [];
  members.forEach(function(m) {
    var net = Math.round((balances[m.id]||0)*100)/100;
    if (net < -0.01) debtors.push({ id:m.id, net:net });
    else if (net > 0.01) creditors.push({ id:m.id, net:net });
  });
  debtors.sort(function(a,b){ return a.net - b.net; });
  creditors.sort(function(a,b){ return b.net - a.net; });
  var txs = []; var di = 0; var ci = 0;
  while (di < debtors.length && ci < creditors.length) {
    var debt = -debtors[di].net;
    var cred = creditors[ci].net;
    var amount = Math.min(debt, cred);
    txs.push({ from:debtors[di].id, to:creditors[ci].id, amount:amount });
    debtors[di].net += amount;
    creditors[ci].net -= amount;
    if (Math.abs(debtors[di].net) < 0.01) di++;
    if (Math.abs(creditors[ci].net) < 0.01) ci++;
  }
  return txs;
}

              {splitMode==='custom'
                ? (hasPaid
                  ? <span style={{ fontSize:12, fontWeight:700, color:t.successText, fontFamily:"'Space Mono',monospace", flexShrink:0 }}>{fmtCLP(customAmounts[m.id]||0)}</span>
                  : <input type="number" defaultValue={customAmounts[m.id]||''} onBlur={function(e){
                      var na = Object.assign({}, customAmounts); na[m.id] = parseFloat(e.target.value)||0;
                      onUpdate({ customAmounts: na });
                    }} placeholder="0" min="0"
                    style={{ width:76, padding:'3px 7px', borderRadius:7, border:'1px solid '+t.border, background:t.inputBg, color:t.text, fontSize:12, fontFamily:"'Space Mono',monospace", textAlign:'right', outline:'none' }} />
                  )
                : <span style={{ fontSize:12, fontWeight:700, color:hasPaid?t.successText:t.primary, fontFamily:"'Space Mono',monospace", flexShrink:0 }}>{fmtCLP(share)}</span>
              }
              <button onClick={function(){setExpandedNoteId(showNote?null:m.id);}}
                style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, padding:'2px 3px', color:note?(customSettled?t.successText:t.primary):t.textMuted }}>📝</button>
              {showPayBtn && (
                <button onClick={function(){togglePaid(m.id);}}
                  style={{ padding:'4px 9px', borderRadius:7, border:'1px solid '+(hasPaid?t.successBorder:t.border), background:hasPaid?t.successBg:t.inputBg, color:hasPaid?t.successText:t.textSub, fontSize:10, fontWeight:700, cursor:'pointer', fontFamily:'inherit', flexShrink:0, whiteSpace:'nowrap' }}>
                  {hasPaid?'✓ Pagó':'¿Pagó?'}
                </button>
              )}
              {!isPayer && (
                <button onClick={function(){excludeMember(m.id);}}
                  style={{ background:'none', border:'none', cursor:'pointer', fontSize:14, padding:'2px 3px', color:t.textMuted, flexShrink:0, lineHeight:1 }}>×</button>
              )}
            </div>
            {showNote && (
              <div style={{ padding:'6px 0 4px 24px', background:rowBg }}>
                <textarea defaultValue={note} onBlur={function(e){
                  var nn = Object.assign({}, memberNotes); nn[m.id] = e.target.value;
                  onUpdate({ memberNotes: nn });
                }} placeholder={'• Bebida: $2.000\n• Comida: $3.000'} rows={3}
                  style={{ width:'100%', padding:'7px 9px', borderRadius:8, border:'1px solid '+t.border, background:t.inputBg, color:t.text, fontSize:11, fontFamily:'inherit', resize:'vertical', outline:'none', lineHeight:1.5 }} />
              </div>
            )}
          </div>
        );
      })}

      {/* Excluded members — can re-add */}
      {excludedMembers.length>0 && (
        <div style={{ marginTop:6, paddingTop:6, borderTop:'1px dashed '+t.divider }}>
          <div style={{ fontSize:9, color:t.textMuted, marginBottom:4, letterSpacing:'0.05em' }}>NO INCLUIDOS</div>
          {excludedMembers.map(function(m){
            return (
              <div key={m.id} style={{ display:'flex', alignItems:'center', gap:6, padding:'4px 0' }}>
                <span style={{ fontSize:16, opacity:0.45, flexShrink:0 }}>{m.avatar}</span>
                <span style={{ flex:1, fontSize:11, color:t.textMuted, fontStyle:'italic' }}>{m.name}</span>
                <button onClick={function(){includeMember(m.id);}}
                  style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:6, border:'1px solid '+t.primaryBorder, background:t.primaryBg, color:t.primary, cursor:'pointer', fontFamily:'inherit' }}>+ Incluir</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── GASTOS VIEW ────────────────────────────────────────────
function GastosView(props) {
  var gastos=props.gastos; var members=props.members; var events=props.events;
  var onRemove=props.onRemove; var onAdd=props.onAdd; var onEdit=props.onEdit; var onUpdate=props.onUpdate;
  var filterEventId=props.filterEventId; var onClearFilter=props.onClearFilter;
  var t = useT();
  var expState = useState(null); var expandedGasto=expState[0]; var setExpandedGasto=expState[1];
  var cds = useState(null); var confirmDel=cds[0]; var setConfirmDel=cds[1];

  var shown = filterEventId
    ? gastos.filter(function(g){ return g.eventId === filterEventId; })
    : gastos;
  var filteredEvent = filterEventId
    ? events.find(function(e){ return e.id === filterEventId; })
    : null;

  var balances = computeBalances(shown, members);
  var transactions = computeTransactions(members, balances);
  var total = shown.reduce(function(s, g) { return s + g.amount; }, 0);

  return (
    <div style={{ paddingTop:14 }}>
      {filteredEvent && (
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 13px', marginBottom:12, borderRadius:11, background:t.primaryBg, border:'1px solid '+t.primaryBorder }}>
          <span style={{ fontSize:13, fontWeight:700, color:t.primary, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>📋 {filteredEvent.title}</span>
          <button className="p-btn" onClick={onClearFilter}
            style={{ fontSize:10, fontWeight:700, padding:'4px 10px', borderRadius:8, border:'1px solid '+t.border, background:t.surface, color:t.textSub, cursor:'pointer', fontFamily:'inherit', boxShadow:t.btnShadow, flexShrink:0 }}>
            Ver todos
          </button>
        </div>
      )}

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
        <div>
          <div style={{ fontSize:17, fontWeight:800, color:t.text }}>Gastos</div>
          <div style={{ fontSize:11, color:t.textMuted }}>{shown.length} gasto{shown.length!==1?'s':''} · {fmtCLP(total)}</div>
        </div>
        <button className="p-btn" onClick={onAdd}
          style={{ padding:'8px 16px', borderRadius:10, border:'1px solid '+t.primaryBorder, background:t.primaryBg, color:t.primary, fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit', boxShadow:t.btnShadow }}>
          + Agregar
        </button>
      </div>

      {shown.length===0
        ? <EmptyBox icon="💰" title="Sin gastos" text="Registra quién pagó qué" />
        : shown.slice().reverse().map(function(g) {
            var payer = members.find(function(m){ return m.id===g.paidBy; });
            var ev    = !filterEventId ? events.find(function(e){ return e.id===g.eventId; }) : null;
            var isExp = expandedGasto === g.id;
            var exclG2 = g.excludedMembers || [];
            var activeMG = members.filter(function(m){ return exclG2.indexOf(m.id) < 0; });
            var nonPayers = activeMG.filter(function(m){ return m.id!==g.paidBy; });
            var isFullyPaid = (g.splitMode||'equal')==='equal'
              ? nonPayers.length>0 && nonPayers.every(function(m){ return (g.paid||{})[m.id]===true; })
              : activeMG.length>0 && activeMG.every(function(m){ return (g.paid||{})[m.id]===true; });
            var cardBg = isFullyPaid ? t.successBg : t.surface;
            var cardBd = isFullyPaid ? t.successBorder : t.border;
            return (
              <div key={g.id} style={{ marginBottom:8 }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 13px', borderRadius:isExp?'12px 12px 0 0':'12px', background:cardBg, border:'1px solid '+cardBd, borderBottom:isExp?'none':('1px solid '+cardBd), boxShadow:isExp?'none':t.cardShadow }}>
                  <div style={{ width:38, height:38, borderRadius:10, background:t.inputBg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>
                    {payer ? payer.avatar : '💰'}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                      <span style={{ fontWeight:700, fontSize:13, color:t.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{g.description}</span>
                      {isFullyPaid && <span style={{ fontSize:10, fontWeight:700, color:t.successText, background:t.successBg, border:'1px solid '+t.successBorder, borderRadius:5, padding:'1px 6px', flexShrink:0 }}>✅ Saldado</span>}
                    </div>
                    <div style={{ fontSize:10, color:isFullyPaid?t.successText:t.textMuted, marginTop:1 }}>
                      {payer ? payer.name : '?'} pagó{ev ? ' · '+ev.title : ''}
                    </div>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:3, flexShrink:0 }}>
                    <span style={{ fontFamily:"'Space Mono',monospace", fontSize:13, fontWeight:800, color:isFullyPaid?t.successText:t.text }}>{fmtCLP(g.amount)}</span>
                    <button onClick={function(){setExpandedGasto(isExp?null:g.id); setConfirmDel(null);}}
                      style={{ background:'none', border:'none', cursor:'pointer', fontSize:12, padding:'3px 5px', color:isExp?t.primary:t.textMuted }}>
                      {isExp?'▲':'▼'}
                    </button>
                    {confirmDel===g.id
                      ? (
                        <div style={{ display:'flex', gap:3 }}>
                          <button className="p-btn" onClick={function(){onRemove(g.id);setConfirmDel(null);}} style={{ padding:'3px 7px', borderRadius:6, border:'1px solid '+t.dangerBorder, background:t.dangerBg, color:t.dangerText, fontSize:10, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>Sí</button>
                          <button className="p-btn" onClick={function(){setConfirmDel(null);}} style={{ padding:'3px 7px', borderRadius:6, border:'1px solid '+t.border, background:t.inputBg, color:t.text, fontSize:10, cursor:'pointer', fontFamily:'inherit' }}>No</button>
                        </div>
                      )
                      : (
                        <div style={{ display:'flex', gap:1 }}>
                          <button onClick={function(){onEdit(g.id);}} style={{ background:'none', border:'none', cursor:'pointer', fontSize:14, padding:'3px 4px', color:t.textMuted }}>✏️</button>
                          <button onClick={function(){setConfirmDel(g.id);}} style={{ background:'none', border:'none', cursor:'pointer', fontSize:16, padding:'3px 4px', color:t.textMuted }}>✕</button>
                        </div>
                      )
                    }
                  </div>
                </div>
                {isExp && (
                  <div style={{ border:'1px solid '+cardBd, borderTop:'none', borderRadius:'0 0 12px 12px', boxShadow:t.cardShadow }}>
                    <GastoDetail g={g} members={members} onUpdate={function(changes){onUpdate(g.id, changes);}} />
                  </div>
                )}
              </div>
            );
          })
      }

      {shown.length>0 && members.length>1 && (
        <div style={{ marginTop:16 }}>
          <SectionHeader label="💸  CUENTAS" mt={0} />
          {transactions.length===0
            ? (
              <div style={{ textAlign:'center', padding:'14px', borderRadius:11, background:t.successBg, border:'1px solid '+t.successBorder, fontSize:13, fontWeight:700, color:t.successText }}>
                ¡Todo al día! ✅
              </div>
            )
            : transactions.map(function(tx, i) {
                var from = members.find(function(m){ return m.id===tx.from; });
                var to   = members.find(function(m){ return m.id===tx.to; });
                return (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'11px 13px', marginBottom:6, borderRadius:11, background:t.surface, border:'1px solid '+t.border, boxShadow:t.cardShadow }}>
                    <span style={{ fontSize:22 }}>{from?from.avatar:'?'}</span>
                    <div style={{ flex:1 }}>
                      <span style={{ fontSize:12, fontWeight:700, color:t.text }}>{from?from.name:'?'}</span>
                      <span style={{ fontSize:11, color:t.textMuted }}> le paga a </span>
                      <span style={{ fontSize:12, fontWeight:700, color:t.text }}>{to?to.name:'?'}</span>
                    </div>
                    <span style={{ fontSize:22 }}>{to?to.avatar:'?'}</span>
                    <div style={{ fontFamily:"'Space Mono',monospace", fontSize:14, fontWeight:900, color:t.primary }}>
                      {fmtCLP(tx.amount)}
                    </div>
                  </div>
                );
              })
          }
        </div>
      )}
    </div>
  );
}

// ── GASTOS MODAL ───────────────────────────────────────────
function GastosModal(props) {
  var onClose=props.onClose; var onSave=props.onSave;
  var members=props.members; var events=props.events;
  var ini=props.initial||null;
  var defaultEventId=ini?ini.eventId||'':(props.defaultEventId||'');
  var t = useT();
  var isEdit = !!ini;

  var ds=useState(ini?ini.description:''); var description=ds[0]; var setDescription=ds[1];
  var as=useState(ini?String(ini.amount):''); var amount=as[0]; var setAmount=as[1];
  var ps=useState(ini?ini.paidBy:(members.length>0?members[0].id:'')); var paidBy=ps[0]; var setPaidBy=ps[1];
  var es=useState(defaultEventId); var eventId=es[0]; var setEventId=es[1];

  var valid = description.trim()!=='' && parseFloat(amount)>0 && paidBy!=='';

  function handleSave() {
    if (!valid) return;
    onSave({ description:description.trim(), amount:parseFloat(amount), paidBy:paidBy, eventId:eventId||null });
  }

  // Format display amount with dots for thousands
  function fmtInput(v) { var n = parseFloat(v); return isNaN(n) ? v : String(Math.round(n)); }

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', backdropFilter:'blur(8px)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:200 }} onClick={onClose}>
      <div className="modal-sheet" style={{ width:'100%', maxWidth:520, maxHeight:'90vh', overflowY:'auto', padding:'24px 18px 34px', borderRadius:'22px 22px 0 0', background:t.modalBg, border:'1px solid '+t.border, borderBottom:'none', boxShadow:t.modalShadow }} onClick={function(e){e.stopPropagation();}}>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:20 }}>
          <div>
            <div style={{ fontSize:19, fontWeight:800, color:t.text }}>{isEdit?'Editar gasto':'Nuevo gasto'}</div>
            <div style={{ fontSize:11, color:t.textMuted, marginTop:2 }}>¿Quién pagó qué?</div>
          </div>
          <ActionBtn onClick={onClose} width={32} height={32} style={{ borderRadius:9, fontSize:14 }}>✕</ActionBtn>
        </div>

        <FieldLabel>Descripción</FieldLabel>
        <input className="p-input" value={description} onChange={function(e){setDescription(e.target.value);}} placeholder="Ej: Asado, cervezas, bencina..." style={inpSt(t)} autoFocus />

        <FieldLabel>Monto ($)</FieldLabel>
        <div style={{ position:'relative', marginBottom:14 }}>
          <input className="p-input" type="number" value={amount} onChange={function(e){setAmount(e.target.value);}} placeholder="0" min="0" step="100"
            style={Object.assign({},inpSt(t),{marginBottom:0, paddingRight:90})} />
          {parseFloat(amount)>0 && (
            <span style={{ position:'absolute', right:13, top:'50%', transform:'translateY(-50%)', fontSize:11, color:t.primary, fontFamily:"'Space Mono',monospace", pointerEvents:'none' }}>
              {fmtCLP(parseFloat(amount))}
            </span>
          )}
        </div>

        <FieldLabel>¿Quién pagó?</FieldLabel>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:6, marginBottom:14 }}>
          {members.map(function(m) {
            var act = paidBy===m.id;
            return (
              <button key={m.id} className="p-btn" onClick={function(){setPaidBy(m.id);}}
                style={{ padding:'10px 4px', borderRadius:11, border:act?('2px solid '+t.primary):('1px solid '+t.border), background:act?t.primaryBg:t.inputBg, cursor:'pointer', color:act?t.primary:t.textSub, fontSize:10, fontFamily:'inherit', fontWeight:act?700:400, textAlign:'center', boxShadow:act?t.btnShadow:'none' }}>
                <span style={{ fontSize:22, display:'block', marginBottom:2 }}>{m.avatar}</span>
                {m.name.split(' ')[0]}
              </button>
            );
          })}
          {members.length===0 && <div style={{ gridColumn:'1/-1', fontSize:12, color:t.textMuted, textAlign:'center', padding:'12px 0' }}>Agrega participantes en la pestaña Grupo</div>}
        </div>

        <FieldLabel>Panorama (opcional)</FieldLabel>
        <select className="p-input" value={eventId} onChange={function(e){setEventId(e.target.value);}} style={Object.assign({},inpSt(t),{appearance:'auto'})}>
          <option value="">Sin panorama</option>
          {events.map(function(ev) {
            return <option key={ev.id} value={ev.id}>{ev.title}</option>;
          })}
        </select>

        <button className="p-btn" onClick={handleSave} disabled={!valid}
          style={{ width:'100%', marginTop:6, padding:'13px', borderRadius:12, border:'none', background:valid?t.primary:t.inputBg, color:valid?(t.isDark?'#000':'#fff'):t.textMuted, fontWeight:800, fontSize:14, cursor:valid?'pointer':'default', fontFamily:'inherit', boxShadow:valid?t.primaryShadow:'none' }}>
          {isEdit ? 'Guardar cambios ✓' : 'Agregar gasto 💰'}
        </button>
      </div>
    </div>
  );
}

// ── EDIT MEMBER MODAL ──────────────────────────────────────
function EditMemberModal(props) {
  var member=props.member; var onClose=props.onClose; var onSave=props.onSave;
  var t = useT();
  if (!member) return null;
  var ns=useState(member.name); var name=ns[0]; var setName=ns[1];
  var as=useState(member.avatar); var avatar=as[0]; var setAvatar=as[1];
  var bs=useState(member.birthday||''); var birthday=bs[0]; var setBirthday=bs[1];
  var valid = name.trim()!=='';

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', backdropFilter:'blur(8px)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:200 }} onClick={onClose}>
      <div className="modal-sheet" style={{ width:'100%', maxWidth:520, maxHeight:'90vh', overflowY:'auto', padding:'24px 18px 34px', borderRadius:'22px 22px 0 0', background:t.modalBg, border:'1px solid '+t.border, borderBottom:'none', boxShadow:t.modalShadow }} onClick={function(e){e.stopPropagation();}}>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
          <div>
            <div style={{ fontSize:19, fontWeight:800, color:t.text }}>Editar participante</div>
            <div style={{ fontSize:11, color:t.textMuted, marginTop:2 }}>Modifica los datos</div>
          </div>
          <ActionBtn onClick={onClose} width={32} height={32} style={{ borderRadius:9, fontSize:14 }}>✕</ActionBtn>
        </div>

        <div style={{ textAlign:'center', marginBottom:18 }}>
          <div style={{ width:68, height:68, borderRadius:18, background:t.inputBg, border:'2px solid '+t.primary, display:'flex', alignItems:'center', justifyContent:'center', fontSize:38, margin:'0 auto', boxShadow:t.primaryShadow }}>{avatar}</div>
        </div>

        <FieldLabel>Nombre o apodo</FieldLabel>
        <input className="p-input" value={name} onChange={function(e){setName(e.target.value);}} placeholder="Ej: El Juancho" style={inpSt(t)} autoFocus />

        <FieldLabel>Cumpleaños (opcional)</FieldLabel>
        <input className="p-input" type="date" value={birthday} onChange={function(e){setBirthday(e.target.value);}} style={inpSt(t)} />

        <FieldLabel>Avatar — {AVATARS.length} opciones</FieldLabel>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(8,1fr)', gap:4, marginBottom:18 }}>
          {AVATARS.map(function(a) {
            var act = avatar===a;
            return <button key={a} className="p-btn" onClick={function(){setAvatar(a);}} style={{ padding:'7px 0', borderRadius:9, border:act?('2px solid '+t.primary):('1px solid '+t.border), background:act?t.primaryBg:t.inputBg, cursor:'pointer', fontSize:21, textAlign:'center', boxShadow:act?t.primaryShadow:'none' }}>{a}</button>;
          })}
        </div>

        <button className="p-btn" onClick={function(){if(!valid)return;onSave(name.trim(),avatar,birthday);}} disabled={!valid}
          style={{ width:'100%', padding:'13px', borderRadius:12, border:'none', background:valid?t.primary:t.inputBg, color:valid?(t.isDark?'#000':'#fff'):t.textMuted, fontWeight:800, fontSize:14, cursor:valid?'pointer':'default', fontFamily:'inherit', boxShadow:valid?t.primaryShadow:'none' }}>
          Guardar cambios ✓
        </button>
      </div>
    </div>
  );
}

// ── MOUNT ──────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
